# Optimization #21: Containerization (Docker Compose)
# This file sets up a production-ready containerized environment for the framework.
version: '3.8'

services:
  smart-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_metaverse_engine
    ports:
      - "3000:3000"     # API & WebSocket Port
      - "50051:50051"   # gRPC Port
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GRPC_PORT=50051
      - JWT_SECRET=${JWT_SECRET:-smart_production_secret_key_123}
      - RATE_LIMIT_MAX_REQUESTS=200
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: smart_metaverse_network
