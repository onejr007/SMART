# Optimization #22: CI/CD Pipeline (GitHub Actions)
# This workflow automates testing, building, and deployment to Firebase.
name: SMART Framework CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  # Optimization #22: Force Node.js 24 for all actions to avoid deprecation (Required by June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgrade from 18 to 24 for future-proofing
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit (Backend Recommendation #4)
        run: npm audit --audit-level=critical

      - name: Run Linting
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      - name: Build Portal (UGC)
        run: npm run build:portal
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Build Framework Components
        run: npm run build:framework

      - name: Docker Build Test
        run: docker build -t smart-engine:latest .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smart-engine-build
          path: dist/
          retention-days: 5

  deploy:
    name: Deploy to Firebase (Hosting + Functions)
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: smart-engine-build
          path: dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase Service Account
        env:
          FIREBASE_SERVICE_ACCOUNT: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMART_34BCC }}'
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > $HOME/firebase-sa.json
          chmod 600 $HOME/firebase-sa.json

      - name: Configure Firebase Runtime Config
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $HOME/firebase-sa.json
        run: |
          firebase functions:config:set \
            smart.firebase_db_url="${{ secrets.FIREBASE_DB_URL }}" \
            smart.firebase_auth_secret="${{ secrets.FIREBASE_AUTH_SECRET }}" \
            smart.allowed_origins="${{ secrets.ALLOWED_ORIGINS }}" \
            --project smart-34bcc

      - name: Deploy Hosting + Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $HOME/firebase-sa.json
        run: |
          firebase deploy --only hosting,functions --project smart-34bcc --non-interactive
