# SMART Metaverse Portal - CI/CD Pipeline
# Standalone Firebase (Hosting + Realtime Database)
name: SMART Portal CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: TypeScript Type Check
        run: npm run typecheck

      - name: Build Production
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy-database-rules:
    name: Deploy Database Rules (jbakun-62239)
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase Service Account (jbakun-62239)
        env:
          FIREBASE_SERVICE_ACCOUNT_JBAKUN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JBAKUN_62239 }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JBAKUN" > $HOME/firebase-sa-jbakun.json
          chmod 600 $HOME/firebase-sa-jbakun.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa-jbakun.json" >> $GITHUB_ENV

      - name: Deploy Database Rules
        run: |
          firebase deploy --only database --project jbakun-62239 --non-interactive

  deploy-hosting:
    name: Deploy Hosting (smart-34bcc)
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase Service Account (smart-34bcc)
        env:
          FIREBASE_SERVICE_ACCOUNT_SMART: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMART_34BCC }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_SMART" > $HOME/firebase-sa-smart.json
          chmod 600 $HOME/firebase-sa-smart.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa-smart.json" >> $GITHUB_ENV

      - name: Deploy Hosting
        run: |
          firebase deploy --only hosting --project smart-34bcc --non-interactive

      - name: Deployment Summary
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 URL: https://smart-34bcc.web.app"
          echo "📦 Build size: $(du -sh dist | cut -f1)"
