# Optimization #22: CI/CD Pipeline (GitHub Actions)
# This workflow automates testing, building, and deployment to Firebase.
name: SMART Framework CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit (Backend Recommendation #4)
        run: npm audit --audit-level=critical

      - name: Run Linting
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      - name: Build Portal (UGC)
        run: npm run build:portal

      - name: Build Framework Components
        run: npm run build

      - name: Docker Build Test
        run: docker build -t smart-engine:latest .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smart-engine-build
          path: dist/
          retention-days: 5

  deploy:
    name: Deploy to Firebase Hosting
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: smart-engine-build
          path: dist

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMART_34BCC }}'
          channelId: live
          projectId: smart-34bcc
