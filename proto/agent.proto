syntax = "proto3";

package agent;

service AgentCommunication {
  rpc SendTask (TaskRequest) returns (TaskResponse) {}
  rpc EvolveCode (EvolveRequest) returns (EvolveResponse) {}
}

message TaskRequest {
  string task_id = 1;
  string payload = 2; // Encrypted payload
}

message TaskResponse {
  string task_id = 1;
  string result = 2; // Encrypted result
  bool success = 3;
}

message EvolveRequest {
  string file_path = 1;
  string instruction = 2;
}

message EvolveResponse {
  string file_path = 1;
  bool success = 2;
  string new_code_hash = 3;
}
